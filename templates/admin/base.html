<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/css/style.css') }}">
</head>

<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-4 custom-navbar">
    <a class="navbar-brand" href="#">Wedding Admin</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Weddings</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Clients</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Vendors</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Bookings</a></li>
        </ul>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4 page-container">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-center py-3 mt-5">
    © 2025 Destination Wedding Admin. All rights reserved.
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
